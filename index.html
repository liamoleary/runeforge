<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RuneForge</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b0905; --bg1: #13100a; --bg2: #1c1710; --bg3: #251e14;
  --bdr: #3a2c18; --bdr2: #6b4f22;
  --gold: #f0c040; --gold2: #ffd966;
  --text: #e8d898; --text2: #9a7e50; --text3: #5a4830;
  --green: #5ac85a; --red: #e03030; --blue: #4488dd;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
button,a,[onclick]{touch-action:manipulation}
html,body{height:100%;overflow-x:hidden}
body{background:var(--bg);color:var(--text);font-family:'Crimson Text',Georgia,serif;font-size:15px}
#hdr{position:sticky;top:0;z-index:200;background:linear-gradient(180deg,#140e04,#0e0a03);border-bottom:2px solid var(--bdr2);padding:6px 12px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 18px rgba(180,120,0,.35)}
#logo{font-family:'Cinzel',serif;font-size:20px;font-weight:700;color:var(--gold);letter-spacing:3px;text-shadow:0 0 14px rgba(240,192,64,.5)}
#hdr-right{display:flex;align-items:center;gap:10px}
.hpill{background:var(--bg2);border:1px solid var(--bdr);border-radius:20px;padding:3px 9px;font-size:12px;display:flex;align-items:center;gap:5px}
.hpbar{width:55px;height:7px;background:#3a0a0a;border-radius:4px;overflow:hidden}
.hpbar-fill{height:100%;background:linear-gradient(90deg,#c02020,#f03030);transition:width .3s;border-radius:4px}
#gold-hdr{font-family:'Cinzel',serif;font-size:13px;color:var(--gold)}
#main{max-width:470px;margin:0 auto;padding:8px 8px 190px;display:flex;flex-direction:column;gap:8px}
.panel{background:var(--bg1);border:1px solid var(--bdr);border-radius:10px;overflow:hidden}
.panel-hdr{background:linear-gradient(90deg,#1a1208,#231a0c);border-bottom:1px solid var(--bdr);padding:7px 12px;font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:var(--text2);letter-spacing:1px;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between}
#skills-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--bdr)}
.sk-card{background:transparent;padding:0;cursor:pointer;position:relative;perspective:1000px;min-height:86px}
.sk-card:active{transform:scale(.97)}
.sk-flip{position:relative;width:100%;height:100%;min-height:86px;transform-style:preserve-3d;transition:transform 0.65s cubic-bezier(0.4,0.2,0.2,1)}
#skills-grid.dungeons-mode .sk-card:not(.dg-btn-in-grid) .sk-flip{transform:rotateY(180deg)}
.sk-front,.sk-back{position:absolute;top:0;left:0;width:100%;height:100%;min-height:86px;backface-visibility:hidden;-webkit-backface-visibility:hidden;background:var(--bg2);padding:9px 10px;box-sizing:border-box;overflow:hidden}
.sk-back{transform:rotateY(180deg);background:linear-gradient(135deg,#1a1308 0%,#241a0c 100%);border:1px solid var(--bdr);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:7px 6px;gap:1px}
.sk-back.locked{background:linear-gradient(135deg,#0e0a04 0%,#15110a 100%);border-color:#1f1810}
.sk-back.locked .dg-icon,.sk-back.locked .dg-name,.sk-back.locked .dg-tier,.sk-back.locked .dg-rwd{display:none}
.sk-back .dg-icon{font-size:22px;line-height:1;display:block;height:24px}
.sk-back .dg-name{font-family:'Cinzel',serif;font-size:11px;color:var(--gold);font-weight:700;line-height:1.1;margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word;max-width:100%}
.sk-back .dg-tier{font-size:8px;color:var(--text3);margin-top:3px;line-height:1.1;letter-spacing:.3px}
.sk-back .dg-rwd{font-size:8px;color:var(--text2);margin-top:1px;display:flex;align-items:center;justify-content:center;gap:2px;line-height:1.1;max-width:100%;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.sk-back .dg-rwd .dg-rwd-ico{font-size:11px;line-height:1}
.sk-back .dg-lock-icon{display:none;font-size:30px;line-height:1}
.sk-back.locked .dg-lock-icon{display:block;filter:drop-shadow(0 0 6px rgba(0,0,0,0.6))}
.sk-back .dg-lock-text{display:none;font-family:'Cinzel',serif;font-size:9px;color:#5a4830;letter-spacing:1px;text-transform:uppercase;margin-top:4px}
.sk-back.locked .dg-lock-text{display:block}
.sk-back .dg-lock-hint{display:none;font-size:9px;color:#3a2c18;margin-top:2px;line-height:1.2;padding:0 4px}
.sk-back.locked .dg-lock-hint{display:block}
.sk-card.sk-active .sk-front{background:#241c0c;box-shadow:inset 0 0 16px rgba(240,192,64,.08)}
.dg-btn-in-grid{background:linear-gradient(180deg,#2a1f0f,#1a1308) !important;border:1px solid var(--gold) !important;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:9px 10px !important;min-height:86px}
#skills-grid:not(.dungeons-mode) .sk-back{pointer-events:none}
#skills-grid.dungeons-mode .sk-front{pointer-events:none}
.sk-top{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.sk-icon{font-size:20px;width:26px;text-align:center;line-height:1}
.sk-name{font-family:'Cinzel',serif;font-size:10px;color:var(--text2);letter-spacing:.5px}
.sk-lvl{font-size:17px;font-weight:700;line-height:1.15;color:var(--text)}
.sk-xp-earned{font-size:8px;color:var(--gold);margin-top:1px}
.sk-slots{display:flex;gap:5px;margin-left:auto;align-items:center}
.sk-slot{font-size:22px;line-height:1;background:var(--bg);border:1.5px solid var(--bdr);border-radius:6px;min-width:34px;height:38px;display:flex;align-items:center;justify-content:center;color:var(--text3);cursor:pointer;padding:0 4px}
.sk-slot.filled{border-color:var(--bdr2);color:var(--gold);background:#1c1710;box-shadow:0 0 6px rgba(240,192,64,0.18)}
.xp-track{background:#0a0804;height:5px;border-radius:3px;overflow:hidden}
.xp-fill{height:100%;border-radius:3px;transition:width .4s ease}
.xp-label{font-size:9px;color:var(--text3);margin-top:2px}
#act-panel .panel-hdr{}
#task-box{margin:10px;background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;padding:11px}
#task-title{font-family:'Cinzel',serif;font-size:14px;color:var(--gold);margin-bottom:7px}
#task-prog-wrap{background:#0a0804;height:9px;border-radius:5px;overflow:hidden}
#task-prog{height:100%;border-radius:5px;transition:width .08s linear;background:linear-gradient(90deg,var(--gold),#ff9900)}
#task-sub{font-size:11px;color:var(--text3);margin-top:4px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.tool-active{display:inline-flex;align-items:center;gap:3px;background:#1c1710;border:1px solid var(--bdr2);border-radius:4px;padding:1px 5px;color:var(--gold);font-size:10px;font-weight:700;margin-left:4px;box-shadow:0 0 6px rgba(240,192,64,0.18)}
.tool-active .ta-ico{font-size:13px;line-height:1}
#task-stop{background:#2a1808;border:1px solid var(--bdr2);border-radius:6px;color:var(--gold);font-size:11px;font-family:'Cinzel',serif;padding:3px 9px;cursor:pointer;display:none}
#task-stop:active{transform:scale(.95)}
#tabs{display:flex;overflow-x:auto;background:#0e0b06;border-bottom:1px solid var(--bdr);scrollbar-width:none}
#tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:7px 11px;cursor:pointer;font-size:9px;font-family:'Cinzel',serif;color:var(--text3);border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;text-transform:uppercase;letter-spacing:.4px}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);background:rgba(240,192,64,.04)}
.tab-icon{font-size:14px;display:block;margin-bottom:1px;text-align:center}
.act-page{display:none;padding:8px}
.act-page.active{display:block}
.act-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.act-btn{background:var(--bg2);border:1px solid var(--bdr);border-radius:7px;padding:10px 7px;color:var(--text);cursor:pointer;text-align:center;font-family:'Crimson Text',serif;font-size:13px;transition:all .18s;min-height:56px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.act-btn:active{transform:scale(.95);background:#2a1e08}
.act-btn.locked{opacity:.35;cursor:not-allowed}
.act-btn.going{border-color:var(--gold);background:#251a06;box-shadow:0 0 10px rgba(240,192,64,.18)}
.act-btn.cant-afford{border-color:#5a1a1a;background:rgba(60,10,10,.3)}
.act-btn.cant-afford .ab-meta{color:#e03030}
.act-btn .ab-icon{font-size:17px}
.act-btn .ab-name{font-family:'Cinzel',serif;font-size:10px;color:var(--text2)}
.act-btn .ab-meta{font-size:9px;color:var(--text3)}
.act-btn .ab-req{font-size:9px;color:#c08020}
#char-panel{}
#char-stats{display:flex;gap:8px;padding:10px 12px}
.stat-box{flex:1;background:var(--bg2);border:1px solid var(--bdr);border-radius:6px;padding:8px;text-align:center}
.stat-box .sb-lbl{font-size:9px;color:var(--text3);font-family:'Cinzel',serif;text-transform:uppercase;letter-spacing:.5px}
.stat-box .sb-val{font-size:18px;font-weight:700;color:var(--text);line-height:1.2}
.stat-box .sb-bar{background:#0a0804;height:5px;border-radius:3px;overflow:hidden;margin-top:4px}
.stat-box .sb-bar-fill{height:100%;border-radius:3px;transition:width .3s}
#equip-row{display:flex;gap:6px;padding:0 10px 10px}
.eq-slot{flex:1;background:var(--bg2);border:1px solid var(--bdr);border-radius:7px;padding:8px 4px;text-align:center;cursor:pointer;transition:all .2s;min-height:54px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.eq-slot:active{transform:scale(.95)}
.eq-slot.on{border-color:var(--bdr2);background:#1e1508}
.eq-slot .eq-icon{font-size:18px}
.eq-slot .eq-lbl{font-size:8px;color:var(--text3)}
.eq-slot .eq-name{font-size:9px;color:var(--text2)}
#inv-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:8px}
.iv-slot{background:var(--bg2);border:1px solid var(--bdr);border-radius:5px;aspect-ratio:1;min-height:58px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .18s;padding:4px;position:relative}
.iv-slot:active{transform:scale(.95)}
.iv-slot.has{border-color:var(--bdr2)}
.iv-ico{font-size:18px;line-height:1}
.iv-nm{font-size:7px;color:var(--text3);text-align:center;line-height:1.1;margin-top:2px}
.iv-qty{position:absolute;bottom:3px;right:4px;font-size:9px;color:var(--gold);font-weight:bold}
#inv-btns{display:flex;gap:6px;padding:4px 8px 8px;flex-wrap:wrap}
.inv-btn{background:var(--bg2);border:1px solid var(--bdr2);border-radius:5px;padding:5px 10px;color:var(--gold);cursor:pointer;font-size:11px;font-family:'Cinzel',serif}
.inv-btn:active{transform:scale(.95);background:var(--bg3)}
#shop-tabs{display:flex;border-bottom:1px solid var(--bdr)}
.shop-tab{flex:1;text-align:center;padding:8px 6px;font-family:'Cinzel',serif;font-size:11px;color:var(--text3);cursor:pointer;letter-spacing:.5px;border-bottom:2px solid transparent;transition:all .15s;text-transform:uppercase}
.shop-tab:active{background:var(--bg2)}
.shop-tab.active{color:var(--gold);border-bottom-color:var(--gold);background:rgba(240,192,64,.04)}
#shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px}
#shop-panel.sell-mode #shop-grid{display:none}
#shop-panel:not(.sell-mode) #shop-sell-list{display:none}
#shop-sell-list{padding:8px}
.ss-empty{font-size:11px;color:var(--text3);text-align:center;padding:16px 8px;font-style:italic}
.ss-row{display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--bg2);border:1px solid var(--bdr);border-radius:6px;margin-bottom:4px}
.ss-row:active{background:var(--bg3)}
.ss-ico{font-size:20px;min-width:24px;text-align:center}
.ss-info{flex:1;min-width:0}
.ss-name{font-family:'Cinzel',serif;font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ss-meta{font-size:9px;color:var(--text3);margin-top:1px}
.ss-meta .ss-price{color:var(--gold);font-weight:600}
.ss-btns{display:flex;gap:4px;flex-shrink:0}
.ss-btn{background:var(--bg1);border:1px solid var(--bdr2);color:var(--gold);font-family:'Cinzel',serif;font-size:10px;padding:5px 9px;border-radius:4px;cursor:pointer;min-width:40px}
.ss-btn:active{transform:scale(.95);background:var(--bg3)}
.ss-btn.ss-all{border-color:var(--gold);background:rgba(240,192,64,.08)}
.sh-item{background:var(--bg2);border:1px solid var(--bdr);border-radius:7px;padding:9px;cursor:pointer;transition:all .18s}
.sh-item:active{transform:scale(.95);background:var(--bg3)}
.sh-item.owned{border-color:var(--green);opacity:.6}
.sh-top{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.sh-icon{font-size:18px}
.sh-name{font-family:'Cinzel',serif;font-size:10px;color:var(--text)}
.sh-price{font-size:12px;color:var(--gold)}
.sh-eff{font-size:9px;color:var(--text3);margin-top:2px}
#log-inner{padding:6px 10px;max-height:140px;overflow-y:auto}
#log-inner::-webkit-scrollbar{width:3px}
#log-inner::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}
.le{font-size:11px;color:var(--text2);padding:2px 0;border-bottom:1px solid #140f07;line-height:1.5}
.lx{color:#5de05d}.li{color:#88ccff}.lg{color:var(--gold)}.ll{color:var(--gold2);font-weight:bold}.lc{color:#ff7070}
#stage{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:470px;height:150px;background:linear-gradient(0deg,#0b0905 0%,rgba(11,9,5,.94) 50%,transparent 95%);display:flex;align-items:flex-end;justify-content:center;padding-bottom:12px;z-index:100;pointer-events:none}
#scene{position:relative;width:140px;height:160px}
#ground{position:absolute;bottom:0;left:-40px;right:-40px;height:22px;background:linear-gradient(0deg,#160e02,#221508);border-top:2px solid #3a2812}
#char{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);width:34px;height:50px}
.c-head{position:absolute;top:0;left:8px;width:18px;height:15px;background:#e0bc8c;border-radius:5px 5px 3px 3px;border:1px solid #c09868}
.c-el,.c-er{position:absolute;width:3px;height:3px;background:#1e1208;border-radius:50%;top:5px}
.c-el{left:3px}.c-er{right:3px}
.c-mouth{position:absolute;width:6px;height:2px;background:#c08060;border-radius:1px;bottom:3px;left:5px}
.c-helm{position:absolute;top:-5px;left:5px;width:24px;height:12px;background:#888;border-radius:50% 50% 0 0;border:1px solid #aaa;display:none}
.c-body{position:absolute;top:14px;left:6px;width:22px;height:21px;background:#3c6040;border-radius:2px;border:1px solid #2c5030}
.c-belt{position:absolute;top:21px;left:6px;width:22px;height:4px;background:#5a3a18;border:1px solid #3a2010}
.c-al{position:absolute;top:14px;left:1px;width:7px;height:17px;background:#3c6040;border-radius:3px;border:1px solid #2c5030;transform-origin:top center}
.c-ar{position:absolute;top:14px;right:1px;width:7px;height:17px;background:#3c6040;border-radius:3px;border:1px solid #2c5030;transform-origin:top center}
.c-ll{position:absolute;top:34px;left:7px;width:8px;height:16px;background:#2a3870;border-radius:0 0 3px 3px;transform-origin:top center}
.c-lr{position:absolute;top:34px;right:7px;width:8px;height:16px;background:#2a3870;border-radius:0 0 3px 3px;transform-origin:top center}
.c-boot-l{position:absolute;top:47px;left:7px;width:9px;height:5px;background:#2a1808;border-radius:1px 2px 3px 2px}
.c-boot-r{position:absolute;top:47px;right:6px;width:9px;height:5px;background:#2a1808;border-radius:2px 1px 2px 3px}
.prop-tree-t{position:absolute;bottom:20px;right:8px;width:10px;height:28px;background:#6b4218;border:1px solid #4a2e12}
.prop-tree-l{position:absolute;bottom:44px;right:-8px;width:38px;height:34px;background:radial-gradient(ellipse,#2e7030,#1e5020);border-radius:50%;border:1px solid #1a4018}
.prop-rock{position:absolute;bottom:20px;right:10px;width:32px;height:22px;background:linear-gradient(135deg,#7a7a7a,#555);border-radius:8px 14px 4px 6px;border:2px solid #444}
.prop-water{position:absolute;bottom:20px;right:4px;width:55px;height:14px;background:linear-gradient(180deg,#1a4890,#0a2860);border-radius:4px 4px 0 0}
.prop-fire{position:absolute;bottom:20px;right:14px;font-size:22px;line-height:1}
.prop-monster{position:absolute;bottom:18px;right:2px;font-size:28px;line-height:1}
.prop-anvil{position:absolute;bottom:18px;right:12px;font-size:20px;line-height:1}
.prop-tool{position:absolute;font-size:15px;pointer-events:none}
@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-3px)}}
@keyframes idle{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-1px)}}
@keyframes swing{0%,100%{transform:rotate(-25deg)}50%{transform:rotate(35deg)}}
@keyframes swing2{0%,100%{transform:rotate(25deg)}50%{transform:rotate(-35deg)}}
@keyframes chop{0%,100%{transform:rotate(-35deg)}40%{transform:rotate(45deg)}}
@keyframes cast{0%,100%{transform:rotate(5deg)}30%{transform:rotate(-40deg)}60%{transform:rotate(25deg)}}
@keyframes stir{0%,100%{transform:rotate(-12deg)}50%{transform:rotate(12deg)}}
@keyframes walk-l{0%,100%{transform:rotate(14deg)}50%{transform:rotate(-10deg)}}
@keyframes walk-r{0%,100%{transform:rotate(-10deg)}50%{transform:rotate(14deg)}}
@keyframes armrest{0%,100%{transform:rotate(5deg)}50%{transform:rotate(-5deg)}}
@keyframes sway{0%,100%{transform:rotate(0deg)}50%{transform:rotate(2.5deg)}}
@keyframes flicker{0%,100%{transform:scaleY(1) scaleX(1)}25%{transform:scaleY(1.12) scaleX(.93)}75%{transform:scaleY(.9) scaleX(1.08)}}
@keyframes ripple{0%,100%{opacity:.7}50%{opacity:1}}
@keyframes lvlup{0%{transform:translate(-50%,-50%) scale(0);opacity:0}25%{transform:translate(-50%,-50%) scale(1.15);opacity:1}70%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-50%) scale(.9);opacity:0}}
@keyframes xpup{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-38px);opacity:0}}
@keyframes dmgflash{0%,100%{background:var(--bg1)}50%{background:#3a0808}}
.lv-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);opacity:0;background:linear-gradient(135deg,#1a1002,#362200);border:2px solid var(--gold);border-radius:14px;padding:22px 32px;text-align:center;z-index:500;box-shadow:0 0 40px rgba(240,192,64,.5);animation:lvlup 2.6s ease forwards;pointer-events:none}
.lv-title{font-family:'Cinzel',serif;font-size:22px;color:var(--gold);text-shadow:0 0 14px rgba(240,192,64,.7)}
.lv-sub{font-size:13px;color:var(--text2);margin-top:6px}
.xp-float{position:fixed;font-size:12px;color:#6ef06e;font-weight:bold;pointer-events:none;z-index:300;animation:xpup 1.4s ease forwards}
.dmg-flash{animation:dmgflash .5s ease}

.dg-dmg-float{position:absolute;font-family:Cinzel,serif;font-weight:bold;pointer-events:none;z-index:10;animation:dgdmgfloat 1.2s ease forwards}
@keyframes dgdmgfloat{0%{transform:translateY(0) scale(1);opacity:1}50%{transform:translateY(-20px) scale(1.3);opacity:1}100%{transform:translateY(-40px) scale(0.8);opacity:0}}
.dg-effectiveness{font-size:9px;font-style:italic;margin-top:2px}
.slot-menu-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:600;display:flex;justify-content:center;align-items:center}
.slot-menu{background:#13100a;border:2px solid var(--bdr2);border-radius:8px;padding:16px;width:300px;max-width:90vw;max-height:80vh;overflow-y:auto}
.slot-menu h3{color:var(--gold);font-family:Cinzel,serif;font-size:14px;margin-bottom:10px;text-align:center}
.slot-menu-item{background:var(--bg2);border:1px solid var(--bdr);border-radius:6px;padding:8px;margin-bottom:6px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .15s}
.slot-menu-item:hover{border-color:var(--gold);background:var(--bg3)}
.slot-menu-item .smi-icon{font-size:20px}
.slot-menu-item .smi-info{flex:1}

.vfx-particle{

}
/* Slash sparks - golden sparks fly out from impact */
@keyframes vfxSpark{
  0%{transform:translate(0,0) scale(1) rotate(0deg);opacity:1}
  30%{opacity:1}
  100%{transform:translate(var(--vfx-dx),var(--vfx-dy)) scale(0) rotate(var(--vfx-rot));opacity:0}
}
.vfx-spark{animation:vfxSpark var(--vfx-dur) ease-out forwards}

/* Blood/hit splats */
@keyframes vfxSplat{
  0%{transform:translate(0,0) scale(0.3);opacity:1}
  20%{transform:translate(var(--vfx-dx2),var(--vfx-dy2)) scale(1.2);opacity:1}
  100%{transform:translate(var(--vfx-dx),var(--vfx-dy)) scale(0.4);opacity:0}
}
.vfx-splat{animation:vfxSplat var(--vfx-dur) ease-out forwards}

/* Star burst for crits */
@keyframes vfxStarburst{
  0%{transform:translate(0,0) scale(0) rotate(0deg);opacity:1}
  15%{transform:translate(0,-4px) scale(1.8) rotate(30deg);opacity:1}
  50%{transform:translate(var(--vfx-dx),var(--vfx-dy)) scale(1) rotate(90deg);opacity:0.8}
  100%{transform:translate(var(--vfx-dx2),var(--vfx-dy2)) scale(0) rotate(180deg);opacity:0}
}
.vfx-star{animation:vfxStarburst var(--vfx-dur) ease-out forwards}

/* Shield block clang */
@keyframes vfxClang{
  0%{transform:scale(0.3) rotate(-20deg);opacity:1}
  20%{transform:scale(1.6) rotate(10deg);opacity:1}
  60%{transform:scale(1) rotate(-5deg);opacity:0.6}
  100%{transform:scale(0.5) rotate(0deg);opacity:0}
}
.vfx-clang{animation:vfxClang 0.6s ease-out forwards;font-size:22px}

/* Heal sparkle */
@keyframes vfxHeal{
  0%{transform:translateY(0) scale(0.5);opacity:0}
  20%{transform:translateY(-5px) scale(1.2);opacity:1}
  80%{transform:translateY(-18px) scale(1);opacity:0.7}
  100%{transform:translateY(-28px) scale(0.6);opacity:0}
}
.vfx-heal{animation:vfxHeal 0.9s ease-out forwards}

/* Impact ring */
@keyframes vfxRing{
  0%{transform:scale(0);opacity:0.9;border-width:3px}

  100%{transform:scale(1.8);opacity:0;border-width:1px}
}

const SKILLS = {

function xpNeeded(lvl){if(lvl<=1)return 0;let t=0;for(let i=1;i<lvl;i++)t+=Math.floor(i+300*Math.pow(2,i/7));return Math.floor(t/4);}
const XP=[];for(let i=0;i<=99;i++)XP[i]=xpNeeded(i);
function lvlOf(xp){for(let i=98;i>=1;i--)if(xp>=XP[i])return i;return 1;}

const ACTIONS = {
  woodcutting:[
    {id:'wc0',name:'Normal Tree',icon:'🌲',req:1,xp:25,dur:3500,prod:[{id:'logs',n:1}]},
    {id:'wc1',name:'Oak Tree',icon:'🌳',req:15,xp:38,dur:5000,prod:[{id:'oak_log',n:1}]},
    {id:'wc2',name:'Willow Tree',icon:'🌿',req:30,xp:68,dur:6000,prod:[{id:'willow_log',n:1}]},

  ],

// SAVE / LOAD

function load(){
  try{const s=localStorage.getItem('rforge');if(s){const d=JSON.parse(s);Object.assign(G,d);}}catch(e){}
  initSkills();initXpTracking();
  if(!G.tools)G.tools={};
  if(!G.dungeonRewards)G.dungeonRewards={};
  if(!G.dungeonsDiscovered)G.dungeonsDiscovered={};
  if(!G.xpEarned)G.xpEarned={};
  if(!G.startedWithSword)G.startedWithSword=false;
  // Trinket removal cleanup: drop legacy state and any trinket items in inventory
  if(G.trinkets)delete G.trinkets;
  const oldTrinketIds=['grove_wc_trinket','grove_mn_trinket','grove_fs_trinket','grove_ck_trinket','grove_sm_trinket','grove_cb_trinket','grove_fl_trinket','grove_cr_trinket','grove_mg_trinket'];
  if(G.inv){for(const tid of oldTrinketIds){if(G.inv[tid])delete G.inv[tid];}}
  // Backfill dungeonRewards: if the player already has a dungeon reward in their inventory,
  // mark that dungeon as already-claimed so the first-victory popup doesn't fire again.
  if(window.DUNGEONS&&G.inv){
    for(const dgId of Object.keys(window.DUNGEONS)){
      const rwd=window.DUNGEONS[dgId].reward;
      if(rwd&&rwd.id&&G.inv[rwd.id]&&!G.dungeonRewards[dgId]){
        G.dungeonRewards[dgId]=true;
      }
    }
  }
  // Backfill dungeonsDiscovered: any skill already at the unlock level is silently marked
  // discovered so the popup doesn't pop retroactively for existing players.
  const unlockLvl=window.DUNGEON_UNLOCK_LEVEL||10;
  if(window.DUNGEONS){
    for(const dgId of Object.keys(window.DUNGEONS)){
      if(!G.dungeonsDiscovered[dgId]&&slvl(dgId)>=unlockLvl){
        G.dungeonsDiscovered[dgId]=true;
      }
    }
  }
}

// SKILL HELPERS
function slvl(sk){return lvlOf(G.skills[sk]?.xp||0);}
function sxp(sk){return G.skills[sk]?.xp||0;}
function xpPct(sk){
  const l=slvl(sk),x=sxp(sk),nl=Math.min(l+1,99);
  if(l>=99)return 100;
  return Math.round(((x-XP[l])/(XP[nl]-XP[l]))*100);
}
function getToolSpeedMult(sk){
  // Lower = faster. Best (smallest) wins between shop upgrade and equipped tool.
  let mult=1;
  const upKey='spd_'+sk.slice(0,4);
  if(G.upgrades[upKey])mult=0.85;
  const tid=G.tools[sk];
  if(tid&&TOOL_BONUS[tid])mult=Math.min(mult,1-TOOL_BONUS[tid]);
  return mult;
}
function getActiveToolBadge(sk){
  // Returns HTML for the active task bar showing equipped tool + bonus, or ''
  const tid=G.tools[sk];
  if(tid&&ITEMS[tid]&&TOOL_BONUS[tid]){
    const pct=Math.round(TOOL_BONUS[tid]*100);
    return '<span class="tool-active" title="'+ITEMS[tid].name+' equipped"><span class="ta-ico">'+ITEMS[tid].icon+'</span>−'+pct+'%</span>';
  }
  const upKey='spd_'+sk.slice(0,4);
  if(G.upgrades[upKey]){
    return '<span class="tool-active" title="Shop tool upgrade"><span class="ta-ico">⚒</span>−15%</span>';
  }
  return '';
}
function updateActiveTaskBar(){
  if(!G.task)return;
  const a=findAction(G.task);const sk=findSkill(G.task);
  if(!a||!sk)return;
  const dur='~'+(G.dur/1000).toFixed(1)+'s';
  document.getElementById('task-dur-lbl').innerHTML=dur+getActiveToolBadge(sk);
}
function recomputeActiveTaskDur(forSk){
  // Re-derives G.dur for the running task (e.g. after equipping a tool).
  // Preserves progress as a percentage so the bar doesn't jump.
  if(!G.task)return;
  const sk=findSkill(G.task);
  if(forSk&&sk!==forSk)return;
  const a=findAction(G.task);
  if(!a||!sk)return;
  const lv=slvl(sk);
  const spd=getToolSpeedMult(sk);
  const lvBonus=Math.max(0.5,1-(lv-a.req)*0.006);
  const newDur=Math.max(800,Math.floor(a.dur*spd*lvBonus));
  const pct=G.dur>0?(G.prog/G.dur):0;
  G.dur=newDur;
  G.prog=Math.min(newDur,pct*newDur);
  updateActiveTaskBar();
}
function addXP(sk,amt){
  const ol=slvl(sk);
  G.skills[sk].xp=(G.skills[sk].xp||0)+amt;
  if(!G.xpEarned)G.xpEarned={};
  G.xpEarned[sk]=(G.xpEarned[sk]||0)+amt;
  const nl=slvl(sk);
  if(nl>ol){
    showLvlUp(sk,nl);
    log('<span class="ll">⭐ LEVEL UP! '+SKILLS[sk].name+' is now level '+nl+'!</span>');
    if(sk==='combat'){G.maxhp=10+Math.floor(nl*1.6);G.hp=Math.min(G.hp+3,G.maxhp);}
    sendLevelNotification(sk,nl);
    // Dungeon discovery: first time you cross the unlock threshold for a skill,
    // pop the dungeon discovery modal so the player knows it's available.
    const unlockLvl=window.DUNGEON_UNLOCK_LEVEL||10;
    if(nl>=unlockLvl&&ol<unlockLvl&&window.DUNGEONS&&window.DUNGEONS[sk]&&!G.dungeonsDiscovered[sk]){
      G.dungeonsDiscovered[sk]=true;
      if(typeof window._dgShowDiscovery==='function')setTimeout(()=>window._dgShowDiscovery(sk),400);
    }
  }
}

// INVENTORY
function has(id,n=1){return(G.inv[id]||0)>=n;}
function give(id,n=1){G.inv[id]=(G.inv[id]||0)+n;}
function take(id,n=1){if(!has(id,n))return false;G.inv[id]-=n;if(G.inv[id]<=0)delete G.inv[id];return true;}

// COMBAT STATS
function getAtk(){
  let a=1;
  if(G.equip.weapon&&ITEMS[G.equip.weapon])a+=(ITEMS[G.equip.weapon].atk||0);
  return a;
}
function getDef(){
  let d=0;
  if(G.equip.armour&&ITEMS[G.equip.armour])d+=(ITEMS[G.equip.armour].def||0);
  return d;
}
// GAME LOOP
let lastT=Date.now();
function tick(){
  const now=Date.now(),dt=Math.min(now-lastT,500);lastT=now;
  if(G.task){
    G.prog+=dt;
    // Combat: monster hits back
    if(G.task&&G.task.startsWith('cb')){
      G.mhit+=dt;
      if(G.mhit>=3800){
        G.mhit=0;
        const action=findAction(G.task);
        if(action){
          const [mn,mx]=action.dmg;
          const d=Math.max(0,Math.floor(mn+Math.random()*(mx-mn+1))-getDef());
          if(d<=0){showStageDmg('BLOCK','miss');}
          if(d>0){
            G.hp=Math.max(0,G.hp-d);
            log('<span class="lc">🐾 '+action.name+' hits you for '+d+'!</span>');showStageDmg(d,'enemy-hit');
            document.body.classList.add('dmg-flash');
            setTimeout(()=>document.body.classList.remove('dmg-flash'),500);
          }
          if(G.hp<=0){G.hp=1;log('<span class="lc">💀 Near death! Eat food immediately!</span>');stopTask();}
        }
      }
    }
    // Magic combat spells also get hit by monsters if applicable
    if(G.task&&G.task.startsWith('mg')&&findAction(G.task)?.isCombatSpell){
      G.mhit+=dt;
      if(G.mhit>=4200){
        G.mhit=0;
        const d=Math.max(0,Math.floor(1+Math.random()*3)-getDef());
        if(d>0){G.hp=Math.max(0,G.hp-d);log('<span class="lc">Magical backlash! -'+d+' HP</span>');}
        if(G.hp<=0){G.hp=1;stopTask();}
      }
    }
    if(G.prog>=G.dur){completeTick();G.prog=0;}
    const pct=Math.min(100,(G.prog/G.dur)*100);
    document.getElementById('task-prog').style.width=pct+'%';
  }
  updateUI();
  if(Math.floor(now/8000)!==Math.floor((now-dt)/8000))save();
}

function completeTick(){
  const a=findAction(G.task);if(!a){stopTask();return;}
  const sk=findSkill(G.task);
  // Check consumables
  if(a.need){
    for(const c of a.need){
      if(!has(c.id,c.n)){
        log('❌ Out of '+(ITEMS[c.id]?.name||c.id)+'. Task stopped.');
        stopTask();return;
      }
    }
    for(const c of a.need)take(c.id,c.n);
  }
  // Combat
  if(a.mhp!==undefined){
    const atk=getAtk();
    let dmgDone=atk+Math.floor(Math.random()*3);
    // Power attack: skip turn to charge, next hit is 2x
    var wasCrit=false;if(G.critStacks>0){var critRoll=Math.random(),critChance=Math.min(0.9,G.critStacks*0.3);if(critRoll<critChance){dmgDone=Math.floor(dmgDone*2.5);log('<span class="lc" style="color:#ffd966">⚡ CRITICAL HIT! '+dmgDone+' damage!</span>');G.critStacks=0;wasCrit=true;showStageDmg(dmgDone,'crit');}else{log('<span class="lc">No crit this time ('+Math.round(critChance*100)+'% chance).</span>');G.critStacks=0;}}
    G.mhp-=dmgDone;
    if(G.mhp<=0){
      addXP(sk,a.xp);
      log('<span class="lc">☠️ You slew the '+a.name+'! (+'+a.xp+' XP)</span>');if(!wasCrit)showStageDmg(dmgDone,'player-hit');
      for(const d of a.drops){
        if(Math.random()<d.c){
          if(d.id==='gold_coins'){G.gold+=d.n;log('<span class="lg">🪙 Looted '+d.n+' gold.</span>');}
          else{give(d.id,d.n);log('<span class="li">📦 '+(ITEMS[d.id]?.icon||'')+(ITEMS[d.id]?.name||d.id)+' x'+d.n+'</span>');}
        }
      }
      G.mhp=a.mhp;
    } else {
      addXP(sk,a.xp/4);
      log('<span class="lc">⚔️ Hit '+a.name+' for '+dmgDone+'. HP: '+G.mhp+'/'+G.mmhp+'</span>');if(!wasCrit)showStageDmg(dmgDone,'player-hit');
    }
  } else if(a.isCombatSpell) {
    // Magic combat spell
    addXP('magic',a.xp);
    log('✨ Cast '+a.name+'! <span class="lx">(+'+a.xp+'xp Magic)</span>');
  } else {
    // Non-combat production
    addXP(sk,a.xp);
    if(a.prod){
      for(const p of a.prod){give(p.id,p.n);}
      const desc=a.prod.map(p=>(ITEMS[p.id]?.icon||'')+(ITEMS[p.id]?.name||p.id)+'×'+p.n).join(', ');
      log(a.icon+' '+desc+' <span class="lx">(+'+a.xp+'xp '+SKILLS[sk].name+')</span>');
    }
  }
  showXPFloat(a.xp,sk);
  refreshButtons(G.tab);
}

function findAction(id){for(const arr of Object.values(ACTIONS))for(const a of arr)if(a.id===id)return a;return null;}
function findSkill(id){for(const[sk,arr]of Object.entries(ACTIONS))for(const a of arr)if(a.id===id)return sk;return null;}

// TASK CONTROL
function startTask(id){
  clearCombatLog();
  const a=findAction(id);if(!a)return;
  const sk=findSkill(id);
  const lv=slvl(sk);
  if(lv<a.req){log('❌ Need level '+a.req+' '+SKILLS[sk].name+'.');return;}
  if(a.need){
    for(const c of a.need){
      if(!has(c.id,c.n)){log('❌ Need '+(ITEMS[c.id]?.name||c.id)+' ×'+c.n+'.');return;}
    }
  }
  if(G.task===id){stopTask();return;}
  G.task=id;G.prog=0;G.mhit=0;G.critStacks=0;
  let dur=a.dur;
  const spd=getToolSpeedMult(sk);
  const lvBonus=Math.max(0.5,1-(lv-a.req)*0.006);
  G.dur=Math.max(800,Math.floor(dur*spd*lvBonus));
  if(a.mhp!==undefined){G.mhp=a.mhp;G.mmhp=a.mhp;}
  document.getElementById('task-title').textContent=a.icon+' '+a.name;
  document.getElementById('task-xp-lbl').textContent='+'+a.xp+' XP · '+SKILLS[sk].name;
  updateActiveTaskBar();
  document.getElementById('task-stop').style.display='block';
  anim();refreshButtons(G.tab);
  log('▶ Started: '+a.name);
}
function stopTask(){
  clearCombatLog();
  G.task=null;G.prog=0;G.critStacks=0;
  document.getElementById('task-title').textContent='Idle — choose a skill and action below';
  document.getElementById('task-prog').style.width='0%';
  document.getElementById('task-xp-lbl').textContent='';
  document.getElementById('task-dur-lbl').textContent='';
  document.getElementById('task-stop').style.display='none';
  anim();refreshButtons(G.tab);
}

    if(!el)continue;
    el.querySelector('.sk-lvl').textContent=lv;
    el.querySelector('.xp-fill').style.width=pc+'%';

    el.querySelector('.xp-label').textContent=(sxp(sk)-cur)+'/'+(nxt-cur);
    const earnedEl=el.querySelector('.sk-xp-earned');
    if(earnedEl)earnedEl.textContent='Total: '+(G.xpEarned[sk]||0)+' xp';
    if(G.task&&findSkill(G.task)===sk)el.classList.add('sk-active');
    else el.classList.remove('sk-active');
    // Update tool slot display
    const toolSlot=el.querySelector('.tool-slot');
    if(toolSlot){
      const upKey='spd_'+sk.slice(0,4);
      const equippedTool=G.tools[sk];
      if(equippedTool&&ITEMS[equippedTool]){
        toolSlot.textContent=ITEMS[equippedTool].icon;

        toolSlot.title='Shop tool equipped';
      } else {
        toolSlot.textContent='○';

      }
    }
    // Refresh dungeon back-card lock state when level changes
    const backEl=el.querySelector('.sk-back');

  if(_shopTab==='sell')renderShopSell();

function showSlotMenu(sk, slotType){
  // Remove any existing menu
  const old=document.getElementById('slot-menu-overlay');if(old)old.remove();
  const ov=document.createElement('div');ov.id='slot-menu-overlay';ov.className='slot-menu-overlay';
  const menu=document.createElement('div');menu.className='slot-menu';
  let title='',items=[];
  if(slotType==='tool'){
    title=SKILLS[sk].icon+' '+SKILLS[sk].name+' - Tool Slot';
    const toolIds=TOOL_MAP[sk]||[];
    const upKey='spd_'+sk.slice(0,4);
    const current=G.tools[sk];
    // Currently equipped inventory tool (can be unequipped back to inventory)
    if(current&&ITEMS[current]){
      const it=ITEMS[current];
      const pct=Math.round((TOOL_BONUS[current]||0)*100);
      items.push({icon:it.icon,name:it.name+' (equipped)',desc:'+'+pct+'% '+SKILLS[sk].name+' speed · tap to unequip',equipped:true,action:()=>{
        give(current,1);delete G.tools[sk];log('Removed '+it.name+' from '+SKILLS[sk].name+' tool slot.');recomputeActiveTaskDur(sk);closeSlotMenu();
      }});
    }
    // Shop upgrade (permanent, separate)
    if(G.upgrades[upKey]){
      const shopItem=SHOP.find(s=>toolIds.includes(s.id));
      items.push({icon:shopItem?shopItem.icon:'⚒',name:(shopItem?shopItem.name:'Tool')+' (shop)',desc:'Permanent shop upgrade · '+(shopItem?shopItem.eff:'+15% speed'),equipped:true,action:()=>closeSlotMenu()});
    }
    // Available tool items in inventory
    Object.entries(G.inv).filter(([id,q])=>q>0&&toolIds.includes(id)&&id!==current).forEach(([id])=>{
      const it=ITEMS[id];if(!it)return;
      const pct=Math.round((TOOL_BONUS[id]||0)*100);
      items.push({icon:it.icon,name:it.name,desc:'+'+pct+'% '+SKILLS[sk].name+' speed',equipped:false,action:()=>{
        if(G.tools[sk]){give(G.tools[sk],1);}
        take(id,1);G.tools[sk]=id;
        log('🛠 Equipped '+it.icon+' '+it.name+' as '+SKILLS[sk].name+' tool! (+'+pct+'% speed)');
        recomputeActiveTaskDur(sk);
        closeSlotMenu();
      }});
    });
    if(items.length===0) items.push({icon:'❌',name:'No tool',desc:'Buy one from the General Store, or find one in the dungeon',equipped:false,action:()=>closeSlotMenu()});
  }
  let h='<h3>'+title+'</h3>';
  items.forEach((it,i)=>{
    h+='<div class="slot-menu-item'+(it.equipped?' equipped':'')+'" data-idx="'+i+'">'
      +'<span class="smi-icon">'+it.icon+'</span><div><div class="smi-name">'+it.name+'</div><div class="smi-desc">'+it.desc+'</div></div></div>';
  });
  h+='<div class="slot-menu-close"><button onclick="closeSlotMenu()">Close</button></div>';
  menu.innerHTML=h;ov.appendChild(menu);document.body.appendChild(ov);
  // Add click handlers
  menu.querySelectorAll('.slot-menu-item').forEach((el,i)=>{el.onclick=()=>items[i].action();});
  ov.onclick=(e)=>{if(e.target===ov)closeSlotMenu();};
}

// Sort order for the sell list so related items stay grouped
const _SELL_TYPE_ORDER={res:0,raw:1,food:2,weapon:3,armour:4,accessory:5,currency:6,tool:7,potion:8};

function renderShopSell(){
  const list=document.getElementById('shop-sell-list');if(!list)return;
  list.innerHTML='';
  const entries=Object.entries(G.inv)
    .filter(([id,q])=>q>0&&ITEMS[id]&&canSell(id)&&sellValue(id)>0)
    .map(([id,q])=>{
      const it=ITEMS[id];
      return{id,qty:q,it,price:sellValue(id)};
    })
    .sort((a,b)=>{
      const ta=_SELL_TYPE_ORDER[a.it.type]??99;
      const tb=_SELL_TYPE_ORDER[b.it.type]??99;
      if(ta!==tb)return ta-tb;
      return a.price-b.price;
    });
  if(!entries.length){
    list.innerHTML='<div class="ss-empty">Nothing to sell right now — come back with some loot.</div>';
    return;
  }
  entries.forEach(({id,qty,it,price})=>{
    const row=document.createElement('div');row.className='ss-row';
    const total=price*qty;
    row.innerHTML=
      '<span class="ss-ico">'+it.icon+'</span>'+
      '<div class="ss-info">'+
        '<div class="ss-name">'+it.name+'</div>'+
        '<div class="ss-meta"><span class="ss-price">'+price+' gp</span> each · '+qty+' in bag · '+total+' gp total</div>'+
      '</div>'+
      '<div class="ss-btns">'+
        '<button class="ss-btn" data-sell-one="'+id+'">Sell 1</button>'+
        '<button class="ss-btn ss-all" data-sell-all="'+id+'">All</button>'+
      '</div>';
    list.appendChild(row);
  });
  // Wire up via delegated clicks to keep markup simple
  list.querySelectorAll('[data-sell-one]').forEach(b=>{b.onclick=()=>sellOne(b.dataset.sellOne);});
  list.querySelectorAll('[data-sell-all]').forEach(b=>{b.onclick=()=>sellStack(b.dataset.sellAll);});
}
// ACTIONS
function useItem(id){
  const it=ITEMS[id];
  if(!it)return;
  if(id==='level_potion'){
    // Show skill selection for level potion
    const skList=Object.keys(SKILLS);
    const msg='Use Level Potion on which skill?\n'+skList.map((s,i)=>(i+1)+'. '+SKILLS[s].name+' (Lv.'+slvl(s)+')').join('\n');
    const choice=prompt(msg,'1');
    if(!choice)return;
    const idx=parseInt(choice)-1;
    if(idx>=0&&idx<skList.length){
      take('level_potion',1);
      const sk=skList[idx];
      const curLvl=slvl(sk);
      const nextLvl=curLvl+1;
      if(nextLvl<=99){
        G.skills[sk].xp=XP[nextLvl];
        showLvlUp(sk,nextLvl);
        log('<span class="ll">🧪 Level Potion used! '+SKILLS[sk].name+' is now level '+nextLvl+'!</span>');
        sendLevelNotification(sk,nextLvl);
      }
    }
    return;
  }
  if(it.type==='food'){
    if(G.hp>=G.maxhp){log('❤️ Already full HP!');return;}
    take(id,1);G.hp=Math.min(G.maxhp,G.hp+(it.hp||3));
    log('🍽️ Ate '+it.name+' and restored '+it.hp+' HP.');if(typeof showStageDmg==='function')showStageDmg(it.hp,'heal');
  } else if(it.type==='tool'){
    // Auto-equip to the matching skill's tool slot
    let matched=false;
    for(const sk of Object.keys(TOOL_MAP)){
      if(TOOL_MAP[sk].includes(id)){
        if(G.tools[sk]===id){
          give(id,1);delete G.tools[sk];
          log('Removed '+it.name+' from '+SKILLS[sk].name+' tool slot.');
        } else {
          if(G.tools[sk])give(G.tools[sk],1);
          take(id,1);G.tools[sk]=id;
          const pct=Math.round((TOOL_BONUS[id]||0)*100);
          log('🛠 Equipped '+it.icon+' '+it.name+' as '+SKILLS[sk].name+' tool! (+'+pct+'% speed)');
        }
        recomputeActiveTaskDur(sk);
        matched=true;break;
      }
    }
    if(!matched)log(it.icon+' '+it.name+' (no matching skill)');
  } else if(it.type==='weapon'){
    if(G.equip.weapon===id){G.equip.weapon=null;log('Unequipped '+it.name);}
    else{G.equip.weapon=id;log('⚔️ Equipped '+it.name+' (+'+it.atk+' Atk)');}
  } else if(it.type==='armour'){
    if(G.equip.armour===id){G.equip.armour=null;log('Unequipped '+it.name);}
    else{G.equip.armour=id;log('🛡️ Equipped '+it.name+' (+'+it.def+' Def)');}
  } else {
    log(it.icon+' '+it.name+' ×'+(G.inv[id]||0));
  }
}

function unequipSlot(slot){G.equip[slot]=null;log('Unequipped '+slot+'.');}

function eatFood(){
  const f=Object.entries(G.inv).filter(([id,q])=>ITEMS[id]?.type==='food'&&q>0).sort((a,b)=>(ITEMS[b[0]].hp||0)-(ITEMS[a[0]].hp||0));
  if(!f.length){log('❌ No food!');return;}
  if(G.hp>=G.maxhp){log('❤️ Already full HP!');return;}
  useItem(f[0][0]);
}

function sellAll(){
  let gold=0,sold=[];
  for(const[id,qty]of Object.entries(G.inv)){
    if(!qty||qty<=0)continue;
    const it=ITEMS[id];if(!it)continue;
    if(it.type==='weapon'||it.type==='armour'||it.type==='food'||it.type==='accessory'||it.type==='potion')continue;
    if(it.special)continue;
    if(it.type==='currency'){gold+=qty;sold.push(it.icon+'×'+qty);delete G.inv[id];continue;}
    gold+=it.sell*qty;sold.push(it.icon+'×'+qty);delete G.inv[id];
  }
  if(gold>0){G.gold+=gold;log('<span class="lg">💰 Sold for '+gold+' gp ('+sold.join(', ')+')</span>');}
  else log('Nothing to sell.');
}

// ===== Shop helpers =====
function canSell(id){
  const it=ITEMS[id];if(!it)return false;
  if(it.special)return false;
  if(id===G.equip.weapon||id===G.equip.armour)return false;
  // Currently-equipped skill tools are also protected
  for(const sk in G.tools){if(G.tools[sk]===id)return false;}
  return true;
}

function sellValue(id){
  const it=ITEMS[id];if(!it)return 0;
  if(it.type==='currency')return 1;
  return it.sell||0;
}

function sellOne(id){
  if(!canSell(id)){log('❌ Cannot sell that item.');return;}
  const qty=G.inv[id]||0;if(!qty){log('❌ None to sell.');return;}
  const v=sellValue(id);if(v<=0){log('❌ No sell value.');return;}
  const it=ITEMS[id];
  G.inv[id]--;if(G.inv[id]<=0)delete G.inv[id];
  G.gold+=v;
  log('<span class="lg">💰 Sold '+it.icon+' '+it.name+' for '+v+' gp.</span>');
  updateUI();
  renderShopSell();
}

function sellStack(id){
  if(!canSell(id)){log('❌ Cannot sell that item.');return;}
  const qty=G.inv[id]||0;if(!qty){log('❌ None to sell.');return;}
  const v=sellValue(id);if(v<=0){log('❌ No sell value.');return;}
  const it=ITEMS[id];
  const total=v*qty;
  delete G.inv[id];
  G.gold+=total;
  log('<span class="lg">💰 Sold '+it.icon+' '+it.name+' ×'+qty+' for '+total+' gp.</span>');
  updateUI();
  renderShopSell();
}

function buryBones(){
  if(!has('bones')){log('❌ No bones!');return;}
  const n=G.inv['bones']||0;
  take('bones',n);
  addXP('combat',n*5);
  log('🦴 Buried '+n+' bones. +'+(n*5)+' Combat XP.');
}

function buy(s){
  if(G.gold<s.cost){log('❌ Need '+s.cost+' gp (have '+G.gold+').');return;}
  if(s.up&&G.upgrades[s.up]){log('Already owned!');return;}
  G.gold-=s.cost;
  if(s.up){G.upgrades[s.up]=true;log('✅ Purchased '+s.name+'! '+s.eff);}
  document.getElementById('shop-grid').innerHTML='';buildShop();
}

// NOTIFICATIONS
function log(msg) {
  const el = document.getElementById('log-inner');
  const d = document.createElement('div');
  d.className = 'le';
  d.innerHTML = msg;
  el.insertBefore(d, el.firstChild);
  while(el.children.length > 200) el.removeChild(el.lastChild);
  if(document.body.classList.contains('combat-active')) {
    const txt = (typeof msg === 'string') ? msg.replace(/<[^>]*>/g,'') : '';
    let ctype = '';
    if(/slew|defeated|killed|slain|vanquish/i.test(txt)) ctype = 'kill';
    else if(/hit.*for|deal|damage|struck|slash/i.test(txt) && !/hits you/i.test(txt)) ctype = 'hit';
    else if(/hits you|hurt|struck you|retaliat/i.test(txt)) ctype = 'enemy';
    else if(/block|absorb|BLOCK/i.test(txt)) ctype = 'block';
    else if(/heal|\bate\b|\beat\b|food|restore|hp\+/i.test(txt)) ctype = 'heal';
    else if(/loot|gold|drop|found|reward/i.test(txt)) ctype = 'loot';
    combatLog(txt, ctype);
  }
}
function combatLog(msg, type) {
  const cl = document.getElementById('combat-log-inner');
  if(!cl) return;
  const d = document.createElement('div');
  d.className = 'cle' + (type ? ' cle-' + type : '');
  d.textContent = msg;
  cl.prepend(d);
  // Keep max 30 entries
  while(cl.children.length > 30) cl.removeChild(cl.lastChild);
}
function clearCombatLog() {
  const cl = document.getElementById('combat-log-inner');
  if(cl) cl.innerHTML = '';
}

// === COMBAT VISUAL FEEDBACK ===
function showStageDmg(amount, type) {
  // type: 'player-hit' (you hit enemy), 'enemy-hit' (enemy hits you), 'crit', 'heal', 'miss'
  const scene = document.getElementById('scene');
  if (!scene) return;
  // Spawn VFX particles
  if (type === 'player-hit') spawnVFX('slash', 'enemy');
  else if (type === 'crit') spawnVFX('crit', 'enemy');
  else if (type === 'enemy-hit') spawnVFX('enemy-hit', 'player');
  else if (type === 'miss') spawnVFX('block', 'player');
  else if (type === 'heal') spawnVFX('heal', 'player');
  const el = document.createElement('div');
  
  if (type === 'miss') {
    el.className = 'stage-miss-float';
    el.textContent = 'MISS';
    el.style.right = '0px';
    el.style.bottom = '70px';
  } else {
    el.className = 'stage-dmg-float';
    if (type === 'crit') {
      el.classList.add('crit');
      el.style.fontSize = '28px';
      el.style.color = '#ffd966';
      el.textContent = '⚡' + amount + '!';
    } else if (type === 'enemy-hit') {
      el.classList.add('enemy-hit');
      el.style.fontSize = '16px';
      el.textContent = '-' + amount;
    } else if (type === 'heal') {
      el.classList.add('heal');
      el.style.fontSize = '18px';
      el.textContent = '+' + amount;
      el.style.left = '30%';
    } else {
      el.style.fontSize = '22px';
      el.style.color = '#5ac85a';
      el.textContent = amount;
    }
    if (type !== 'enemy-hit' && type !== 'heal') {
      el.style.right = (5 + Math.random() * 20) + 'px';
    }
    el.style.bottom = (55 + Math.random() * 15) + 'px';
  }
  
  scene.appendChild(el);
  setTimeout(() => el.remove(), type === 'crit' ? 1400 : 1200);
  
  // Screen shake for hits
  if (type === 'player-hit' || type === 'crit') {
    document.body.classList.add('shake-hit');
    // Flash monster
    const monster = document.querySelector('.prop-monster');
    if (monster) monster.classList.add('monster-hit-flash');
    setTimeout(() => {
      document.body.classList.remove('shake-hit');
      if (monster) monster.classList.remove('monster-hit-flash');
    }, 350);
  }
  
  // Red vignette for taking damage
  if (type === 'enemy-hit') {
    const vig = document.getElementById('hit-vignette');
    if (vig) {
      vig.classList.remove('active');
      void vig.offsetWidth;
      vig.classList.add('active');
      setTimeout(() => vig.classList.remove('active'), 500);
    }
  }
}

    panel.classList.add('active');
    panel.querySelector('.smhp-name').textContent = a.icon + ' ' + a.name;
    const pct = Math.max(0, (G.mhp / G.mmhp) * 100);
    panel.querySelector('.smhp-fill').style.width = pct + '%';
    panel.querySelector('.smhp-text').textContent = G.mhp + '/' + G.mmhp + ' HP';
  } else {
    panel.classList.remove('active');
  }
}

function updateCombatStatsPanel() {
  const panel = document.getElementById('combat-stats-panel');
  if (!panel) return;
  const sk = G.task ? findSkill(G.task) : null;
  const isCombat = sk === 'combat';
  
  if (isCombat) {
    panel.classList.add('active');
    document.body.classList.add('combat-active');
    
    const wp = G.equip.weapon;
    const am = G.equip.armour;
    const wpItem = wp ? ITEMS[wp] : null;
    const amItem = am ? ITEMS[am] : null;
    
    document.getElementById('csp-wpn-icon').textContent = wpItem ? wpItem.icon : '🗡️';
    document.getElementById('csp-wpn-name').textContent = wpItem ? wpItem.name : 'None';
    document.getElementById('csp-wpn-bonus').textContent = wpItem ? '+' + wpItem.atk + ' ATK' : '+0 ATK';
    
    document.getElementById('csp-arm-icon').textContent = amItem ? amItem.icon : '🛡️';
    document.getElementById('csp-arm-name').textContent = amItem ? amItem.name : 'None';
    document.getElementById('csp-arm-bonus').textContent = amItem ? '+' + amItem.def + ' DEF' : '+0 DEF';
    
    document.getElementById('csp-total-atk').textContent = getAtk();
    document.getElementById('csp-total-def').textContent = getDef();
    document.getElementById('csp-total-hp').textContent = Math.ceil(G.hp) + '/' + G.maxhp;
  } else {
    panel.classList.remove('active');
    document.body.classList.remove('combat-active');
  }
}

// INIT

    function showIntro(){
      var ov=document.createElement('div');
      ov.id='intro-overlay';
      ov.innerHTML='<div class="intro-box">'
        +'<div class="intro-sword">\u2694\uFE0F</div>'
        +'<div class="intro-title">RuneForge</div>'
        +'<div class="intro-sub">An Idle Adventure</div>'
        +'<div class="intro-text">'
        +'You awaken at the edge of a wild frontier, a <b>Bronze Sword</b> at your side.<br><br>'
        +'Fish, mine, chop, and cook to survive. Craft powerful gear. '
        +'Venture into <b>dungeons</b> to battle creatures and claim rare loot.<br><br>'
        +'Adventure, crafting, and glory await.'
        +'</div>'
        +'<button class="intro-btn" onclick="dismissIntro()">Begin Adventure</button>'
        +'</div>';
      document.body.appendChild(ov);
    }
    function dismissIntro(){
      var ov=document.getElementById('intro-overlay');
      if(ov){ov.style.transition='opacity 0.5s';ov.style.opacity='0';setTimeout(function(){ov.remove();},500);}
      G.hasSeenIntro=true;save();
    }

    function init(){
  load();
  giveStarterSword();
  if(!G.hasSeenIntro){showIntro();}
      buildSkills();buildTabs();buildShop();
  updateUI();anim();
  setInterval(tick,50);
  requestNotificationPermission();
  log('🎮 <b>Welcome to RuneForge!</b> You start with a Bronze Sword!');
  log('💡 Tip: Fish shrimp → Cook food → Enter the Dungeon! Chop logs → Fletch bows. Mine ores → Smith gear.');
  if(G.task){
    const sk=findSkill(G.task);
    const a=findAction(G.task);
    if(sk&&a){
      switchTab(sk);
      document.getElementById('task-title').textContent=a.icon+' '+a.name;
      document.getElementById('task-xp-lbl').textContent='+'+a.xp+' XP · '+SKILLS[sk].name;
      updateActiveTaskBar();
      document.getElementById('task-stop').style.display='block';
    }
  } else {
    switchTab(G.tab||'woodcutting');
  }
}
document.addEventListener('visibilitychange',()=>{if(!document.hidden)lastT=Date.now();});
window.addEventListener('load',init);
</script>
